<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA / Native-feel viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />

    <!-- Theme color matches app body background exactly to eliminate the status bar divider line -->
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: light)" />
    <meta name="msapplication-TileColor" content="#0a0a0f" />

    <!-- iOS PWA full-screen: black-translucent makes status bar transparent so app bleeds behind it -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Naksha" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / description -->
    <meta name="description" content="Your Time. Your Orbit. — A study timer and productivity app." />
    <meta name="application-name" content="Naksha" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <title>Naksha</title>

    <!--
      CRITICAL: Set background before JS loads.
      Must match #0a0a0f exactly — same as body background and manifest theme_color.
      This eliminates the visible divider/border line below the status bar.
    -->
    <style>
      html, body {
        background: #0a0a0f !important;
        background-color: #0a0a0f !important;
        margin: 0;
        padding: 0;
        border: none;
        box-shadow: none;
        min-height: 100%;
      }
      /* Fixed shell — no top border, no shadow, no gaps */
      #root {
        position: fixed;
        inset: 0;
        height: 100dvh;
        overflow: hidden;
        background: #0a0a0f;
        border: none;
        box-shadow: none;
        /* Use safe-area-inset-top so content starts exactly at the boundary with no gap */
        padding-top: env(safe-area-inset-top, 0px);
      }
      /*
       * Cover the safe-area gap at the very bottom.
       * Matches app background exactly — no color mismatch.
       */
      body::after {
        content: '';
        display: block;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: env(safe-area-inset-bottom, 20px);
        background-color: #0a0a0f;
        z-index: 9999;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
